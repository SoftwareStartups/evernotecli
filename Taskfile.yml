version: "3"

tasks:
  install:
    desc: Install dependencies
    cmd: bun install

  build:
    desc: Build TypeScript
    cmds:
      - bun run build

  clean:
    desc: Remove build artifacts
    cmd: rm -rf build/ dist/

  format:
    desc: Format with Biome
    cmds:
      - bun run format

  format:check:
    desc: Check formatting
    cmds:
      - bun run format:check

  lint:
    desc: Lint with Biome
    cmds:
      - bun run lint

  typecheck:
    desc: Type-check with TypeScript
    cmds:
      - bun run typecheck

  check:
    desc: Run lint and typecheck
    deps: [lint, typecheck]

  test:
    desc: Run unit and integration tests
    cmds:
      - bun run test

  test:unit:
    desc: Run unit tests only
    cmds:
      - bun run test:unit

  test:integration:
    desc: Run integration tests only
    cmds:
      - bun run test:integration

  test:e2e:
    desc: Run e2e tests (requires EVERNOTE_TOKEN)
    cmds:
      - bun run test:e2e

  test:all:
    desc: Run all tests
    cmds:
      - bun run test:all

  thrift:
    desc: Regenerate Thrift clients (requires Apache thrift compiler)
    cmds:
      - rm -rf src/edam && mkdir -p src/edam
      - thrift --gen js:node,ts -out src/edam thrift/Types.thrift 2>&1 | grep -vE "64-bit constant|No generator named|^$$" || true
      - thrift --gen js:node,ts -out src/edam thrift/Errors.thrift 2>&1 | grep -vE "64-bit constant|No generator named|^$$" || true
      - thrift --gen js:node,ts -out src/edam thrift/Limits.thrift 2>&1 | grep -vE "64-bit constant|No generator named|^$$" || true
      - thrift --gen js:node,ts -out src/edam thrift/NoteStore.thrift 2>&1 | grep -vE "64-bit constant|No generator named|^$$" || true
      - thrift --gen js:node,ts -out src/edam thrift/UserStore.thrift 2>&1 | grep -vE "64-bit constant|No generator named|^$$" || true

  compile:
    desc: Compile to standalone binary
    cmds:
      - mkdir -p dist
      - bun build src/index.ts --compile --outfile dist/evercli

  compile:all:
    desc: Compile for all platforms
    cmds:
      - mkdir -p dist
      - bun build src/index.ts --compile --target=bun-linux-x64 --outfile dist/evercli-linux-x64
      - bun build src/index.ts --compile --target=bun-linux-arm64 --outfile dist/evercli-linux-arm64
      - bun build src/index.ts --compile --target=bun-darwin-x64 --outfile dist/evercli-darwin-x64
      - bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile dist/evercli-darwin-arm64

  ci:
    desc: Run full CI pipeline locally
    cmds:
      - task: clean
      - task: install
      - task: format:check
      - task: check
      - task: build
      - task: test

  all:
    desc: Run full build pipeline
    cmds:
      - task: clean
      - task: install
      - task: build
      - task: check
      - task: test

  serve:
    desc: Start MCP server
    cmd: bun run build/index.js serve
